services:
  mysql:
    image: mysql:8.0
    container_name: trendpulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trendpulse
      MYSQL_USER: trendpulse
      MYSQL_PASSWORD: trendpulse
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - trendpulse-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendpulse-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      local-llm:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: trendpulse
      MYSQL_USERNAME: trendpulse
      MYSQL_PASSWORD: trendpulse
      JWT_SECRET: mjyw123123
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_STATIC_TOKEN: mjyw123123123
      JWT_STATIC_USER_EMAIL: dev@trendpulse.local
      FRONTEND_REDIRECT_URL: http://localhost:3000/oauth/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-docker-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-docker-google-client-secret}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOCAL_LLM_PROVIDER: openai-compatible
      LOCAL_LLM_BASE_URL: http://local-llm:8080
      LOCAL_LLM_MODEL: gemma-3-4b-it-Q4_K_M
      LOCAL_LLM_TIMEOUT_MS: 60000
    ports:
      - "8080:8080"

  local-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: trendpulse-local-llm
    restart: unless-stopped
    command:
      - "-m"
      - "/models/gemma-3-4b-it-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "4096"
    volumes:
      - ../models:/models:ro
    ports:
      - "11434:8080"

volumes:
  trendpulse-mysql-data:
