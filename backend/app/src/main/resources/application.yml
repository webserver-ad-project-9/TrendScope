spring:
  application:
    name: trendpulse-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:trendpulse}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:trendpulse}
    password: ${MYSQL_PASSWORD:trendpulse}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/api/auth/login/callback}
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET:mjyw123123}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  static-token: ${JWT_STATIC_TOKEN:mjyw123123123}
  static-user-email: ${JWT_STATIC_USER_EMAIL:dev@trendpulse.local}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

trendpulse:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  frontend-redirect-url: ${FRONTEND_REDIRECT_URL:http://localhost:3000/oauth/callback}
  naver:
    base-url: ${NAVER_NEWS_BASE_URL:https://openapi.naver.com/v1/search/news.json}
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  llm:
    host: ${LOCAL_LLM_HOST:localhost:8000}
    api-key: ${LOCAL_LLM_API_KEY:}
    model: ${LOCAL_LLM_MODEL:gemma-3-4b-it-gguf}
    timeout-ms: ${LOCAL_LLM_TIMEOUT_MS:30000}
